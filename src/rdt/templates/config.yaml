# .rdt.yaml — ROS2 Dev Tools project configuration
# All fields are optional. Sensible defaults are applied automatically.

ros_distro: jazzy
# install_dir: /opt/ros

# Base image for Docker builds. One or the other; if both empty, defaults to
# ros:${ROS_DISTRO}-ros-base (the ARG default in the rdt bundled Dockerfile).
# base_image_name: ""             # e.g., "registry.example.com/my-base:latest"
# base_image_dockerfile: ""       # path to a Dockerfile that builds the base image

build:
  cmake_args:
    - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    - -DCMAKE_EXPORT_COMPILE_COMMANDS=1
  # colcon_args: []
  # packages_select: []
  # install_base: install

test:
  retest_until_pass: 0
  # colcon_args: []
  # packages_select: []

docker:
  # registry: registry.app.unistra.fr/group/project
  # builder: docker                    # docker | kaniko

doc:
  sphinx_dir: doc/sphinx
  output_dir: doc/sphinx/build/html
  # multi_version: false              # true -> output/<branch>/<lang>/, false -> output/ or output/<lang>/
  # apt_packages:                     # system packages installed before the sphinx build
  #   - doxygen
