# GitHub Actions CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ros:ROS_DISTRO-ros-base
    steps:
      - uses: actions/checkout@v4

      - name: Install rdt
        run: pip install rdt

      - name: Install dependencies
        run: rdt deps

      - name: Build
        run: rdt build

      - name: Test
        run: rdt test

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install rdt
        run: pip install rdt

      - name: Build image
        run: rdt build-docker

      - name: Push image
        run: rdt deploy-docker
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
