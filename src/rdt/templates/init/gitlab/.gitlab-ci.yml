# GitLab CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

stages:
  - format
  - build-test

.job_template:
  image: ros:jazzy-ros-base
  before_script:
    - |
      apt-get update \
      && apt-get install -y --no-install-recommends \
        git \
        python3-pip python3-venv \
      && python3 -m venv /opt/venv \
      && /opt/venv/bin/pip install --upgrade pip \
      && /opt/venv/bin/pip install git+https://github.com/tpoignonec/rdt.git@main \
      && ln -s /opt/venv/bin/rdt /usr/local/bin/rdt
    - rdt info

format:
  stage: format
  extends: .job_template
  script:
    - apt-get update && apt-get install -y --no-install-recommends pre-commit
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - pre-commit run --all-files

build-test:
  stage: build-test
  extends: .job_template
  script:
    - rdt deps
    - rdt build
    - rdt test
