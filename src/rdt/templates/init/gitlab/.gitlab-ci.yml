# GitLab CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

stages:
  - build-test
  - docker

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  REGISTRY: $CI_REGISTRY

build-test:
  stage: build-test
  image: ros:ROS_DISTRO-ros-base
  script:
    - pip install rdt
    - rdt deps
    - rdt build
    - rdt test

build-docker:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - pip install rdt
    - rdt build-docker --builder kaniko --registry $CI_REGISTRY
  variables:
    REGISTRY_USER: $CI_REGISTRY_USER
    REGISTRY_TOKEN: $CI_REGISTRY_PASSWORD
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
