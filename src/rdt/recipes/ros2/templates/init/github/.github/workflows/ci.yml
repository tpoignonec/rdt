# GitHub Actions CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install rdt
        run: pip install rdt-devtools[ci]

      - name: Build
        run: rdt ci build

      - name: Test
        run: rdt ci test
