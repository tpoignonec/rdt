# GitLab CI for ROS 2 workspace.
# Generated by rdt init — customise as needed.

stages:
  - build
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

.rdt-setup: &rdt-setup
  before_script:
    - pip install rdt-devtools[ci]

build:
  stage: build
  image: python:3.12
  <<: *rdt-setup
  script:
    - rdt ci build

test:
  stage: test
  image: python:3.12
  <<: *rdt-setup
  script:
    - rdt ci test

deploy:
  stage: deploy
  image: python:3.12
  <<: *rdt-setup
  script:
    - rdt ci deploy --push
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
